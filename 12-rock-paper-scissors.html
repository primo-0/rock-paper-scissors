<!DOCTYPE html>
<html>
  <head>
      <title>08-Rock-paper-scissors</title>
      <link rel="stylesheet"
            href="12-rock-paper-scissors.css">
  </head>
  <body>
      <p class="title">Rock Paper Scissors</p>

      
      <button 
      class="move-button js-rock-button"><img class="move-icon" src="/images/rock-emoji.png"></button>
    

      <button 
      class="move-button js-paper-button"><img class="move-icon" src="/images/paper-emoji.png"></button>


      <button 
      class="move-button js-scissors-button"><img class="move-icon" src="/images/scissors-emoji.png"></button>

      <p class="result js-result"></p>
      <p class="js-moves"></p>
      <p class="js-score"></p>

       <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        updateScoreElement();
        localStorage.removeItem('score');
      "
      class="reset-score-button">Reset Score</button>


      <button class="auto-play-button" onclick="
      autoPlay();
      ">Auto Play</button>

      
      <script src="12-rock-paper-scissors.js"></script>
  </body>
</html>
